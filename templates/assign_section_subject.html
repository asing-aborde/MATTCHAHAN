{% extends "base.html" %}

{% block content %}

<div class="container">
    <div class="card">

        <h1>Assign Subject to Section</h1>

        <form method="POST">

            <label>Section</label><br>
            <select name="section_id">
                {% for sec in sections %}
                <option value="{{ sec[0] }}">
                    Grade {{ sec[1] }} - {{ sec[2] }}
                </option>
                {% endfor %}
            </select>

            <br><br>

            <label>Subject</label><br>
            <select name="subject_id">
                {% for sub in subjects %}
                <option value="{{ sub[0] }}">
                    {{ sub[1] }}
                </option>
                {% endfor %}
            </select>

            <br><br>

            <button type="submit">Assign</button>

        </form>

        <br>
        <a href="/admin-dashboard">← Back</a>

    </div>
</div>

{% endblock %}
