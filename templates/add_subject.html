{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card">

        <h1>Add Subject</h1>

        <form method="POST">

            <label>Subject Name</label><br>
            <input type="text" name="subject_name" required>
            <br><br>

            <label>Grade Level</label><br>
            <input type="text" name="grade_level" required>
            <br><br>

            <button type="submit">Save</button>

        </form>

        <br>
        <a href="/subjects">← Back to Subjects List</a>

    </div>

</div>

{% endblock %}
