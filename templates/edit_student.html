{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card">

        <h1>Edit Student</h1>

        <form method="POST">

            <label>Name</label><br>
            <input name="name" value="{{ student[1] }}" required>
            <br><br>

            <label>Grade Level</label><br>
            <input name="grade_level" value="{{ student[2] }}" required>
            <br><br>

            <label>Section</label><br>
            <input name="section" value="{{ student[3] }}" required>
            <br><br>

            <button type="submit">Update</button>

        </form>

        <br>
        <a href="/students">← Back to Students List</a>

    </div>

</div>

{% endblock %}
