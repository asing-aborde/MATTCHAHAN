{% extends "base.html" %}

{% block content %}

<div class="container">
    <div class="card">

        <h1>Add Section</h1>

        <form method="POST">

            <label>Grade Level</label><br>
            <input type="text" name="grade_level" placeholder="e.g. 10" required>
            <br><br>

            <label>Section Name</label><br>
            <input type="text" name="section_name" placeholder="e.g. Maligaya" required>
            <br><br>

            <button type="submit">Save</button>

        </form>

        <br>
        <a href="/sections">← Back to Sections</a>

    </div>
</div>

{% endblock %}
