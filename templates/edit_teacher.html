{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card">

        <h1>Edit Teacher</h1>

        <form method="POST">

            <label>Name</label><br>
            <input type="text" name="name" value="{{ teacher[1] }}" required>
            <br><br>

            <label>Email</label><br>
            <input type="text" name="email" value="{{ teacher[2] }}" required>
            <br><br>

            <label>Department</label><br>
            <input type="text" name="department" value="{{ teacher[3] }}" required>
            <br><br>

            <button type="submit">Update</button>

        </form>

        <br>
        <a href="/teachers">← Back to Teachers List</a>

    </div>

</div>

{% endblock %}
